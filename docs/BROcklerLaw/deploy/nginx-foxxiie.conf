# foxxiie.com – Nginx config
# Serves foxxiie.com root site only.
# Brockler routes are intentionally blocked on this domain.
# Both HTTP (port 80) and HTTPS (port 443) are accessible – no forced redirect.
# SSL cert managed by Certbot (see deploy.sh for cert generation).

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name foxxiie.com www.foxxiie.com;

    root /var/www/foxxiie.com;
    index index.html;

    location = / {
        try_files /index.html =404;
        charset utf-8;
    }

    # Brockler and admin routes are not served from foxxiie.com
    location = /admin { return 404; }
    location = /admin/ { return 404; }
    location ^~ /admin/ { return 404; }
    location = /brocklerlaw { return 410; }
    location ^~ /brocklerlaw/ { return 410; }

    # Case lookup page
    location = /check-my-case {
        return 301 /check-my-case/;
    }

    location /check-my-case/ {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    # Disable Brockler API endpoints on foxxiie.com
    location = /save { return 404; }
    location = /cases { return 404; }
    location = /cases-sync { return 404; }

    # Certbot ACME challenge (needed during cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Deny hidden files
    location ~ /\. { deny all; }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
# NOTE: This block is only active AFTER cert is obtained via certbot.
# If cert does not exist yet, certbot will add/replace ssl directives.
# Until then, HTTPS is not available (only HTTP works).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foxxiie.com www.foxxiie.com;

    # These paths are created by certbot. If they don't exist yet, this server block won't load.
    # Run: sudo certbot --nginx to obtain certs.
    ssl_certificate     /etc/letsencrypt/live/foxxiie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxxiie.com/privkey.pem;

    # SSL options (only loaded if certbot has run)
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/foxxiie.com;
    index index.html;

    location = / {
        try_files /index.html =404;
        charset utf-8;
    }

    # Brockler and admin routes are not served from foxxiie.com
    location = /admin { return 404; }
    location = /admin/ { return 404; }
    location ^~ /admin/ { return 404; }
    location = /brocklerlaw { return 410; }
    location ^~ /brocklerlaw/ { return 410; }

    # Case lookup page
    location = /check-my-case {
        return 301 /check-my-case/;
    }

    location /check-my-case/ {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    # Disable Brockler API endpoints on foxxiie.com
    location = /save { return 404; }
    location = /cases { return 404; }
    location = /cases-sync { return 404; }

    location ~ /\. { deny all; }
}
