name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - feature/**

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: .:backend
      DATABASE_URL: sqlite:///./analytics.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q tests -k "not test_build_latest_dataset_ignores_non_charge_docket_entries"
