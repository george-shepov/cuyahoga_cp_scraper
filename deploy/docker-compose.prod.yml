services:
  postgres:
    ports: !reset []

  mongodb:
    ports: !reset []

  redis:
    ports: !reset []

  ollama:
    ports: !reset []

  scraper:
    restart: unless-stopped

  api:
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    restart: unless-stopped

  worker:
    restart: unless-stopped
