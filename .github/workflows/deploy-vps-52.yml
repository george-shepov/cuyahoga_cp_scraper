name: Deploy To VPS .52

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      task_summary:
        description: "Optional note about the task being deployed"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets['VPS_SSH_PRIVATE_KEY'] }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets['VPS_HOST'] }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_USER: ${{ secrets['VPS_USER'] }}
          VPS_HOST: ${{ secrets['VPS_HOST'] }}
          VPS_APP_DIR: ${{ secrets['VPS_APP_DIR'] }}
          DEPLOY_BRANCH: master
          REPO_SLUG: ${{ github.repository }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "bash -s" << 'EOF'
          set -euo pipefail

          APP_DIR="${VPS_APP_DIR:-/opt/cuyahoga_cp_scraper}"
          BRANCH="${DEPLOY_BRANCH:-master}"

          if [[ ! -d \"$APP_DIR/.git\" ]]; then
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER":"$USER" "$APP_DIR"
            git clone "git@github.com:${REPO_SLUG}.git" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"

          if command -v docker >/dev/null 2>&1; then
            cd deploy
            docker compose up -d --build
          else
            echo "Docker is not installed on VPS. Aborting deploy." >&2
            exit 1
          fi
          EOF

      - name: Deployment summary
        run: |
          echo "Deployed commit: $GITHUB_SHA"
          if [[ -n "${{ github.event.inputs.task_summary }}" ]]; then
            echo "Task summary: ${{ github.event.inputs.task_summary }}"
          fi