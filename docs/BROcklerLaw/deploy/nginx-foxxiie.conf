# foxxiie.com – Nginx config
# Serves foxxiie.com root site only.
# Brockler routes are intentionally blocked on this domain.
# Both HTTP (port 80) and HTTPS (port 443) are accessible – no forced redirect.
# SSL cert managed by Certbot (see deploy.sh for cert generation).

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name foxxiie.com www.foxxiie.com;

    root /var/www/foxxiie.com;
    index index.html;
    auth_basic "Brockler Law Preview";
    auth_basic_user_file /etc/nginx/.htpasswd_foxxiie;

    location = / {
        try_files /index.html =404;
        charset utf-8;
    }

    # Brockler and admin routes are not served from foxxiie.com
    location = /admin { return 404; }
    location = /admin/ { return 404; }
    location ^~ /admin/ { return 404; }

    # Brockler Law preview pages
    location = /brocklerlaw { return 301 /brocklerlaw/; }
    location ^~ /brocklerlaw/ {
        root /var/www/foxxiie.com;
        try_files $uri $uri/index.html $uri/ =404;
        charset utf-8;
    }

    # Stripe checkout endpoint (proxied to save_api)
    location = /stripe-checkout {
        proxy_pass         http://127.0.0.1:8765/stripe-checkout;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        client_max_body_size 64k;
    }

    # Case lookup page
    location = /check-my-case {
        return 301 /check-my-case/;
    }

    location /check-my-case/ {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    # Disable other Brockler API endpoints on foxxiie.com
    location = /save { return 404; }
    location = /cases { return 404; }
    location = /cases-sync { return 404; }

    # Certbot ACME challenge (needed during cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Deny hidden files
    location ~ /\. { deny all; }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
# NOTE: This block is only active AFTER cert is obtained via certbot.
# If cert does not exist yet, certbot will add/replace ssl directives.
# Until then, HTTPS is not available (only HTTP works).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foxxiie.com www.foxxiie.com;

    # These paths are created by certbot. If they don't exist yet, this server block won't load.
    # Run: sudo certbot --nginx to obtain certs.
    ssl_certificate     /etc/letsencrypt/live/foxxiie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxxiie.com/privkey.pem;

    # SSL options (only loaded if certbot has run)
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/foxxiie.com;
    index index.html;
    auth_basic "Brockler Law Preview";
    auth_basic_user_file /etc/nginx/.htpasswd_foxxiie;

    location = / {
        try_files /index.html =404;
        charset utf-8;
    }

    # Brockler and admin routes are not served from foxxiie.com
    location = /admin { return 404; }
    location = /admin/ { return 404; }
    location ^~ /admin/ { return 404; }

    # Brockler Law preview pages
    location = /brocklerlaw { return 301 /brocklerlaw/; }
    location ^~ /brocklerlaw/ {
        root /var/www/foxxiie.com;
        try_files $uri $uri/index.html $uri/ =404;
        charset utf-8;
    }

    # Stripe checkout endpoint (proxied to save_api)
    location = /stripe-checkout {
        proxy_pass         http://127.0.0.1:8765/stripe-checkout;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        client_max_body_size 64k;
    }

    # Case lookup page
    location = /check-my-case {
        return 301 /check-my-case/;
    }

    location /check-my-case/ {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    # Disable other Brockler API endpoints on foxxiie.com
    location = /save { return 404; }
    location = /cases { return 404; }
    location = /cases-sync { return 404; }

    location ~ /\. { deny all; }
}
