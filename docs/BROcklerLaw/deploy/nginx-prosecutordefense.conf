# prosecutordefense.com - Brockler Law served at root (no /brocklerlaw/ prefix)

server {
    listen 80;
    listen [::]:80;
    server_name prosecutordefense.com www.prosecutordefense.com;

    root /var/www/prosecutordefense.com/brocklerlaw;
    index index.html;

    # Legacy /brocklerlaw/* → strip prefix and redirect
    location ^~ /brocklerlaw/ {
        rewrite ^/brocklerlaw/(.*)$ /$1 permanent;
    }

    location = /admin {
        return 301 /admin/;
    }
    location = /admin.html {
        return 301 /admin/;
    }
    location = /admin/ {
        try_files /admin/index.html /admin.html =404;
        charset utf-8;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html /admin.html =404;
        charset utf-8;
    }

    location = /save {
        proxy_pass         http://127.0.0.1:8765/save;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        client_max_body_size 3M;
    }

    location = /backups {
        proxy_pass         http://127.0.0.1:8765/backups;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location = /restore {
        proxy_pass         http://127.0.0.1:8765/restore;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    location = /cases {
        proxy_pass         http://127.0.0.1:8765/cases;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location = /cases-sync {
        proxy_pass         http://127.0.0.1:8765/cases-sync;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
    }

    location = /scrape-trigger {
        proxy_pass         http://127.0.0.1:8765/scrape-trigger;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        client_max_body_size 1k;
    }

    location = /check-my-case {
        return 301 /check-my-case/;
    }

    location ^~ /check-my-case/ {
        root /var/www/prosecutordefense.com;
        try_files $uri $uri/ /check-my-case/index.html =404;
        charset utf-8;
    }

    location = /seo {
        return 301 /seo/;
    }

    location ^~ /seo/ {
        try_files $uri $uri/ $uri/index.html =404;
        charset utf-8;
    }

    location / {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        charset utf-8;
    }

    location ~ /\. { deny all; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prosecutordefense.com www.prosecutordefense.com;

