# prosecutordefense.com - BrocklerLaw path-based site with Let's Encrypt SSL

server {
    listen 80;
    listen [::]:80;
    server_name prosecutordefense.com www.prosecutordefense.com;

    root /var/www/prosecutordefense.com;
    index index.html;

    location = / {
        return 302 /brocklerlaw/;
    }

    location = /admin {
        return 301 /brocklerlaw/admin/;
    }

    location = /admin/ {
        return 301 /brocklerlaw/admin/;
    }

    location = /brocklerlaw {
        return 301 /brocklerlaw/;
    }

    location /brocklerlaw/ {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    location = /brocklerlaw/admin {
        return 301 /brocklerlaw/admin/;
    }

    location = /brocklerlaw/admin/ {
        try_files /brocklerlaw/admin/index.html /brocklerlaw/admin.html =404;
        charset utf-8;
    }

    location = /brocklerlaw/save {
        proxy_pass         http://127.0.0.1:8765/save;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        client_max_body_size 3M;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        charset utf-8;
    }

    location ~ /\. { deny all; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prosecutordefense.com;

    ssl_certificate     /etc/letsencrypt/live/prosecutordefense.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prosecutordefense.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/prosecutordefense.com;
    index index.html;

    location = / {
        return 302 /brocklerlaw/;
    }

    location = /admin {
        return 301 /brocklerlaw/admin/;
    }

    location = /admin/ {
        return 301 /brocklerlaw/admin/;
    }

    location = /brocklerlaw {
        return 301 /brocklerlaw/;
    }

    location /brocklerlaw/ {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    location = /brocklerlaw/admin {
        return 301 /brocklerlaw/admin/;
    }

    location = /brocklerlaw/admin/ {
        try_files /brocklerlaw/admin/index.html /brocklerlaw/admin.html =404;
        charset utf-8;
    }

    location = /brocklerlaw/save {
        proxy_pass         http://127.0.0.1:8765/save;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        client_max_body_size 3M;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        charset utf-8;
    }

    location ~ /\. { deny all; }
}